name: Scan Dockerfile and Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  scan:
    runs-on: robot-dind
    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    # - name: Restore Trivy Cache
    #   uses: actions/cache@v4
    #   with:
    #     path: ${{ github.workspace }}/.cache/trivy
    #     key: trivy-cache-${{ runner.os }}
    #     restore-keys: |
    #       trivy-cache-${{ runner.os }}

    - name: Downcase REPO
      run: |
        echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

    - name: Get Job ID
      id: get_job_id
      run: |
        curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
        "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
        | jq '.jobs[] | select(.name=="scan") | .id' > job_id.txt
        echo "job_id=$(cat job_id.txt)" >> $GITHUB_OUTPUT

    - name: Scan Dockerfile 
      uses: aquasecurity/trivy-action@0.28.0
      with:
        scan-type: 'config'
        scan-ref: '.'
        severity: 'CRITICAL,HIGH'
        cache: true
        exit-code: '1'
        format: 'table'
        output: 'dockerfile_scanning_result.json'

    - name: Send mail to committer if detect vulnerability in Dockerfile
      if: failure()
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{secrets.MAIL_USERNAME}}
        password: ${{secrets.MAIL_PASSWORD}}
        subject: "[ALERT] Vulnerabilities Found in Dockerfile"
        body: |
          Hi ${{ github.event.head_commit.author.name }},

          The recent build for commit ${{ github.event.head_commit.id }} has detected vulnerabilities

          Please review the details and take appropriate action.

          View the full report here:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${{ steps.get_job_id.outputs.job_id }}

          Best,
          SRE Team
        to: kien.kim@svtech.com.vn
        from: SRE-team
  
    - name: Show results for Dockerfile scanning
      if: always()
      run: |
        echo "##[command] Show results for Dockerfile scanning"
        cat dockerfile_scanning_result.json
  
    - name: Build image
      if: always()
      run: |
        docker buildx build \
          --cache-from=type=registry,ref=ghcr.io/${{ env.REPO }}:cache \
          --load \
          --tag bngblaster-app:latest .

    - name: Scan Docker image
      if: always()
      uses: aquasecurity/trivy-action@0.28.0
      with:
        scan-type: 'image'
        scan-ref: 'bngblaster-app:latest'
        severity: 'CRITICAL,HIGH'
        cache: true
        exit-code: '1'
        format: 'table'
        output: 'image_scanning_result.json'

    - name: Send mail to committer if detect vulnerability in Docker image
      if: failure()
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{secrets.MAIL_USERNAME}}
        password: ${{secrets.MAIL_PASSWORD}}
        subject: "[ALERT] Vulnerabilities Found in Docker Image"
        body: |
          Hi ${{ github.event.head_commit.author.name }},

          The recent build for commit ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.head_commit.id }} has detected vulnerabilities

          Please review the details and take appropriate action.

          View the full report here:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${{ steps.get_job_id.outputs.job_id }}

          Best,
          SRE Team
        to: kien.kim@svtech.com.vn
        from: SRE-team

    - name: Show results for Image scanning
      if: always()
      run: |
        echo "##[command] Show results for Image scanning"
        cat image_scanning_result.json

    - name: Upload Dockerfile scan results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Dockerfile scanning result
        path: dockerfile_scanning_result.json
        
    - name: Upload Image scanning results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Image scanning result
        path: image_scanning_result.json
        