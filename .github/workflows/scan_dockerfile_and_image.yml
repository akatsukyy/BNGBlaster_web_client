
name: Scan Dockerfile and Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main 

jobs:
  scan:
    runs-on: robot-dind
    permissions:
      contents: read
      packages: write
    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    # - name: Scan Dockerfile 
    #   id: scan_dockerfile
    #   uses: aquasecurity/trivy-action@0.28.0
    #   with:
    #     scan-type: 'config'
    #     scan-ref: '.'
    #     severity: 'CRITICAL,HIGH'
    #     cache: true
    #     format: 'table'
    #     output: 'dockerfile_scan_result.json'
       
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: '${{ github.repository_owner }}'
        password: '${{ secrets.GITHUB_TOKEN }}'
  
    - name: Downcase REPO
      run: |
        echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
  
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build and push image to ghcr.io
      run: |
        docker buildx build \
          --cache-from=type=registry,ref=ghcr.io/${{ env.REPO }}:cache \
          --cache-to=type=registry,ref=ghcr.io/${{ env.REPO }}:cache,mode=max \
          --push \
          --tag ghcr.io/${{ env.REPO }}:v1.${{ github.run_number }} . 

    - name: Scan Docker image
      id: scan_image
      uses: aquasecurity/trivy-action@0.28.0
      with:
        scan-type: 'image'
        scan-ref: 'my-bngblaster-app:latest'
        severity: 'CRITICAL,HIGH'
        cache: true
        format: 'table'

    - name: Show Image scan results in logs
      run: cat image_scan_result.json

    - name: Upload Image scan results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Image scan result
        path: image_scan_result.json

    - name: Show Dockerfile scan results in logs
      run: cat dockerfile_scan_result.json

    - name: Upload Dockerfile scan results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Dockerfile scan result
        path: dockerfile_scan_result.json