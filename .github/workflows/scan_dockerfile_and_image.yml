
name: Scan Dockerfile and Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main 

jobs:
  scan:
    runs-on: robot-dind
    permissions:
      contents: read
      packages: write
    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Scan Dockerfile 
      id: scan_dockerfile
      uses: aquasecurity/trivy-action@0.28.0
      with:
        scan-type: 'config'
        scan-ref: '.'
        severity: 'CRITICAL,HIGH'
        cache: true
        format: 'table'
        output: 'dockerfile_scan_result.json'

    - name: Show Trivy scan results in logs
      run: cat dockerfile_scan_result.json

    - name: Upload scan results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Dockerfile scan result
        path: dockerfile_scan_result.json
       
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: '${{ github.repository_owner }}'
        password: '${{ secrets.GITHUB_TOKEN }}'
  
    - name: Downcase REPO
      run: |
        echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
  
    - name: Build Docker image
      run: docker build -t my-bngblaster-app:latest .

    - name: Scan Docker image
      id: scan_image
      uses: aquasecurity/trivy-action@0.28.0
      with:
        scan-type: 'image'
        scan-ref: 'my-bngblaster-app:latest'
        severity: 'CRITICAL,HIGH'
        cache: true
        format: 'table'
